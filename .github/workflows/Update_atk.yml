name: Update ATK Data

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 1' # Kjører hver mandag kl 00:00

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Henter hele historikken for tryggere rebase

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run scraper
        run: python hent_fotobokser.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Legg til fila
          git add ATK.csv
          
          # Lagre lokalt først
          git commit -m "Automatisk oppdatering av ATK-data" || echo "Ingen endringer"
          
          # Hent endringer fra GitHub og plasser våre endringer på toppen (tving gjennom våre data)
          git pull --rebase -X theirs origin main
          
          # Send til GitHub
          git push origin main
