name: Update ATK Data

on:
  workflow_dispatch: # Gir deg den grå knappen for å starte manuelt
  schedule:
    - cron: '0 0 * * 1' # Kjører automatisk hver mandag kl. 00:00

jobs:
  build:
    runs-on: ubuntu-latest
    
    # Gir Action-serveren lov til å skrive filer tilbake til prosjektet ditt
    permissions:
      contents: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run scraper
        run: python hent_fotobokser.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Henter eventuelle manuelle endringer du har gjort i nettleseren først
          git pull --rebase origin main
          
          # Legger til fila hvis den er endret
          git add ATK.csv
          
          # Lagrer endringen, men går videre selv om det ikke er nye data (|| true)
          git commit -m "Automatisk oppdatering av ATK-liste fra NVDB v4" || echo "Ingen endringer å lagre"
          
          # Sender fila tilbake til GitHub
          git push origin main
